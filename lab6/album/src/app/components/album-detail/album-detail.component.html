<div class="detail-container" *ngIf="!loading && album; else loadingTpl">
  <a routerLink="/albums" class="back-link">← Назад к альбомам</a>
  <h2>{{ album.title }}</h2>
  <p><strong>ID альбома:</strong> {{ album.id }}</p>
  <p><strong>ID пользователя:</strong> {{ album.userId }}</p>

  <div class="edit-section">
    <label for="titleInput">Редактировать название:</label>
    <input id="titleInput" type="text" [(ngModel)]="editTitle" class="title-input" />
    <button class="btn btn-save" (click)="saveTitle()">Сохранить</button>
  </div>

  <div class="detail-actions">
    <a [routerLink]="['/albums', album.id, 'photos']" class="btn">Смотреть фото</a>
    <a routerLink="/albums" class="btn btn-back">Назад</a>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="detail-container">
    <div class="loading">
      <div class="spinner"></div>
      <p>Загрузка...</p>
    </div>
  </div>
</ng-template>
