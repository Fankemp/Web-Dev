<div class="photos-container">
  <div class="photos-header">
    <a [routerLink]="['/albums', albumId]" class="back-link">← Назад к альбому</a>
    <h2>Фотографии альбома #{{ albumId }}</h2>
  </div>

  <ng-container *ngIf="photos$ | async as photos; else loadingTpl">
    <div class="photos-grid" *ngIf="photos.length > 0">
      <div class="photo-card" *ngFor="let photo of photos">
        <div class="photo-wrapper">
          <img [src]="photo.thumbnailUrl" [alt]="photo.title">
          <div class="photo-overlay">
            <span>{{ photo.title }}</span>
          </div>
        </div>
        <p class="photo-title">{{ photo.title }}</p>
      </div>
    </div>
    <p *ngIf="photos.length === 0" class="empty">Нет фотографий для этого альбома.</p>
  </ng-container>

  <ng-template #loadingTpl>
    <div class="loading">
      <div class="spinner"></div>
      <p>Загрузка фотографий...</p>
    </div>
  </ng-template>
</div>
