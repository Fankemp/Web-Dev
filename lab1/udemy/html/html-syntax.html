<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Syntax Example</title>
</head>
<body>

    <div>
        <h1>
            HTML <span style="color:blue;">Syntax</span> Example
        </h1>

        <p>
            HTML uses tags to structure content.
            Most tags have an opening and a closing tag.
            Some tags emphasize text, like <em>this text is emphasized</em>.
        </p>

        <p>
            You can also combine tags:
            <strong>Bold</strong> and <em>emphasized</em> together.
        </p>

        <a href="https://www.example.com">This is a link</a>
    </div>

</body>
</html>
