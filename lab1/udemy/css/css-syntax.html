<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML with CSS Example</title>

    <!-- Встроенный CSS -->
    <style>
        /* Стили для всего тела страницы */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }

        /* Стили для заголовка */
        h1 {
            color: #2a9df4;
            text-align: center;
        }

        a {
            color: #e74c3c;
            text-decoration: none;
        }


        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            margin: 0 auto;
        }
        button {
            background-color: #2a9df4;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a7cc8;
        }

        ul, ol {
            margin-left: 20px;
        }

        img {
            display: block;
            max-width: 100%;
            margin: 10px 0;
            border-radius: 5px;
        }

        /* Стили для выделенного текста */
        em {
            color: #e67e22;
            font-style: italic;
        }

        span {
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HTML <span>and CSS</span> Example</h1>
        <p>
            This is a paragraph demonstrating <em>emphasized text</em> and a <a href="https://www.example.com" target="_blank">link</a>.
        </p>

        <img src="https://via.placeholder.com/300" alt="Placeholder Image">

        <h2>Unordered List</h2>
        <ul>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ul>

        <h2>Ordered List</h2>
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>Third item</li>
        </ol>

        <button>Click Me</button>

    </div>

</body>
</html>
